<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bùi Đăng Quân | Fix Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p-color: #6366f1; --bg: #030712; --card: rgba(17, 24, 39, 0.9); --text: #f9fafb; --t-color: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .panel { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .progress-bar { height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #bar { height: 100%; background: linear-gradient(90deg, var(--p-color), #a855f7); width: 0%; transition: 1.5s ease-in-out; }
        .qr-wrapper { background: #fff; padding: 20px; border-radius: 20px; text-align: center; color: #000; margin: 15px 0; }
        .qr-wrapper img { width: 100%; max-width: 200px; border-radius: 10px; }
        .donor-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 8px; border-left: 4px solid var(--t-color); display: flex; justify-content: space-between; align-items: center; }
        .donor-date { font-size: 0.6rem; color: #94a3b8; }
        .error-msg { font-size: 0.7rem; color: #ef4444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <div style="width: 80px; height: 80px; margin: 0 auto 10px; border-radius: 50%; border: 2px solid var(--p-color); overflow: hidden;">
                <img src="https://i.ibb.co/gZvn2jXg/2c712dc97850837209ce3bc3f67262aa-0.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <h1 style="font-size: 1.3rem; font-weight: 800;">Bùi Đăng Quân</h1>
        </header>

        <div class="panel">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800;">
                <span>MỤC TIÊU 10 TRIỆU</span>
                <span id="percent">0%</span>
            </div>
            <div class="progress-bar"><div id="bar"></div></div>
            <div style="text-align: center;">Đã nhận: <b id="total" style="color: var(--t-color);">0đ</b></div>
        </div>

        <div class="panel">
            <h3 style="font-size: 0.8rem; margin-bottom: 8px;">❤️ Đôi lời của Quân</h3>
            <p style="font-size: 0.8rem; color: #cbd5e0; line-height: 1.5;">Chào bạn, mọi sự ủng hộ của bạn đều là động lực rất lớn để mình phát triển mỗi ngày. Cảm ơn bạn rất nhiều!</p>
        </div>

        <div class="panel">
            <div class="qr-wrapper">
                <div style="font-size: 0.75rem; font-weight: 800;">MB BANK: 18520091234</div>
                <div style="font-size: 0.7rem; margin-bottom: 10px;">CTK: BUI DANG QUAN</div>
                <img id="qrImg" src="">
                <div style="font-size: 0.75rem; margin-top: 10px; font-weight: 800; color: #ef4444;">NỘI DUNG: UNG HO QUAN</div>
            </div>
        </div>

        <div class="panel">
            <h3 style="font-size: 0.85rem; margin-bottom: 12px;">🏆 BẢNG VÀNG</h3>
            <div id="list" style="font-size: 0.8rem;">Đang kết nối hệ thống...</div>
            <div id="error" class="error-msg"></div>
        </div>
    </div>

    <script>
        const KEY = 'PCEGWXWT5SLHPOV7PRZFOBRHYGOIU0LDEUUFIQBLH9FASKWYQTA3RKPEMK09YM3N';
        const STK = '18520091234';
        const GOAL = 10000000;

        async function updateData() {
            try {
                // Giải pháp Proxy mới để vượt CORS
                const proxy = "https://api.allorigins.win/get?url=";
                const target = encodeURIComponent("https://my.sepay.vn/api/transactions/list");
                
                const response = await fetch(`${proxy}${target}&cacheBust=${Date.now()}`);
                if (!response.ok) throw new Error("Proxy không phản hồi");

                const result = await response.json();
                // Dữ liệu SePay nằm trong contents dưới dạng chuỗi JSON
                const data = JSON.parse(result.contents);

                if (data.messages) {
                    // Lọc giao dịch có chữ QUAN
                    const trans = data.messages.filter(t => (t.content || "").toUpperCase().includes("QUAN"));
                    
                    const totalAmount = trans.reduce((s, t) => s + parseInt(t.amount), 0);
                    
                    // Cập nhật UI
                    document.getElementById('total').innerText = totalAmount.toLocaleString() + "đ";
                    const pct = Math.min((totalAmount / GOAL) * 100, 100);
                    document.getElementById('bar').style.width = pct + "%";
                    document.getElementById('percent').innerText = Math.round(pct) + "%";

                    if (trans.length > 0) {
                        document.getElementById('list').innerHTML = trans.slice(0, 5).map(t => `
                            <div class="donor-item">
                                <div>
                                    <div style="font-weight:800">+${parseInt(t.amount).toLocaleString()}đ</div>
                                    <div class="donor-date">${t.transaction_date}</div>
                                </div>
                                <div style="font-size:0.6rem; background:rgba(16,185,129,0.2); padding:2px 8px; border-radius:10px; color:var(--t-color)">Thành công</div>
                            </div>
                        `).join('');
                    } else {
                        document.getElementById('list').innerHTML = "Chưa có giao dịch nào.";
                    }
                    document.getElementById('error').innerText = "";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('error').innerText = "Đang thử lại kết nối...";
            }
        }

        // Khởi tạo mã QR
        document.getElementById('qrImg').src = `https://qr.sepay.vn/img?acc=${STK}&bank=MBBank&amount=50000&des=UNG HO QUAN`;

        // Chạy lần đầu và lặp lại
        updateData();
        setInterval(updateData, 20000); // 20 giây cập nhật 1 lần
    </script>
</body>
</html>
