<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bùi Đăng Quân | Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --p-color: #6366f1; --s-color: #f43f5e; --t-color: #10b981;
            --momo-color: #a50064;
            --bg: #030712; --card: rgba(17, 24, 39, 0.9);
            --border: rgba(255, 255, 255, 0.1); --text: #f9fafb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: var(--bg); color: var(--text); min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15), transparent 50%);
            display: flex; flex-direction: column; align-items: center; padding-bottom: 50px;
        }

        .container { width: 100%; max-width: 480px; padding: 0 20px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }

        /* GOAL */
        .goal-header { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; }
        .progress-container { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--p-color), var(--t-color)); transition: width 1.5s ease; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px; text-align: center; }
        .stat-card b { display: block; font-size: 1.1rem; color: #fff; }
        .stat-card span { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; }

        /* QR AREA */
        .qr-wrapper { background: #fff; padding: 20px; border-radius: 25px; text-align: center; margin: 10px 0; color: #1a1a1a; }
        .qr-info-box { border-bottom: 1px dashed #ccc; margin-bottom: 12px; padding-bottom: 10px; }
        .qr-info-box div { font-size: 0.75rem; font-weight: 800; }
        .qr-info-box b { color: var(--p-color); }
        .big-amt { font-size: 1.2rem; color: var(--s-color); font-weight: 900; margin-top: 5px; display: block; }
        .qr-wrapper img { width: 180px; display: block; margin: 0 auto; border-radius: 10px; }

        .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .price-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 15px; padding: 12px 5px; cursor: pointer; text-align: center; transition: 0.2s; }
        .price-item.active { background: var(--p-color); transform: scale(1.05); }

        #momoBtn { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--momo-color); color: #fff; font-weight: 800; cursor: pointer; }

        /* DONOR LIST */
        .donor-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 15px; margin-bottom: 8px; border-left: 4px solid var(--t-color); }
        .donor-info b { font-size: 0.8rem; color: #fff; display: block; }
        .donor-amount { font-weight: 800; color: var(--t-color); font-size: 0.9rem; }
    </style>
</head>
<body>

    <header style="text-align: center; padding: 40px 0 20px;">
        <div style="width: 80px; height: 80px; margin: 0 auto 15px; border-radius: 50%; border: 3px solid var(--p-color); overflow: hidden;">
            <img src="https://i.ibb.co/gZvn2jXg/2c712dc97850837209ce3bc3f67262aa-0.jpg" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <h1 style="font-size: 1.4rem; font-weight: 800;">Bùi Đăng Quân</h1>
        <p style="color: var(--p-color); font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;">SEPAY AUTOMATION LIVE</p>
    </header>

    <main class="container">
        <div class="panel">
            <div class="goal-header"><span>MỤC TIÊU 10 TRIỆU</span><span id="goalPercent">0%</span></div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div style="text-align: center; font-size: 0.65rem; margin-top: 8px;">Đã nhận: <b id="totalReceived">0đ</b></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><b id="dailyTotal">0đ</b><span>Hôm nay</span></div>
            <div class="stat-card"><b id="donorCount">0</b><span>Lượt ủng hộ</span></div>
        </div>

        <div class="panel">
            <input type="number" id="customAmount" placeholder="Nhập số tiền..." oninput="handleCustomInput()" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; text-align: center; margin-bottom: 10px; font-weight: 800; outline: none;">
            <div class="price-grid" id="priceGrid"></div>
            
            <div class="qr-wrapper">
                <div class="qr-info-box">
                    <div>CTK: <b>BUI DANG QUAN</b></div>
                    <div>STK: <b>18520091234</b> (MB Bank)</div>
                    <span class="big-amt" id="amtDisplay">0đ</span>
                </div>
                <img id="qrImg" src="">
                <p style="font-size: 0.65rem; color: #64748b; font-weight: 800; margin-top: 10px;">NỘI DUNG: <span style="color: var(--s-color);">UNG HO QUAN</span></p>
            </div>
            <button id="momoBtn" onclick="openMomo()">THANH TOÁN MOMO</button>
        </div>

        <div class="panel">
            <h3 style="font-size: 0.8rem; margin-bottom: 12px;"><i class="fa-solid fa-star" style="color: #fbbf24;"></i> BẢNG VÀNG MỚI NHẤT</h3>
            <div id="donorList"><div style="text-align: center; color: #4b5563; font-size: 0.7rem;">Đang kết nối SePay...</div></div>
        </div>
    </main>

    <script>
        const CONFIG = {
            stk: "18520091234", bank: "MBBank",
            sepay_key: 'PCEGWXWT5SLHPOV7PRZFOBRHYGOIU0LDEUUFIQBLH9FASKWYQTA3RKPEMK09YM3N',
            goal: 10000000,
            prices: [
                { v: 10000, e: "🥤" }, { v: 20000, e: "🍞" }, { v: 50000, e: "🍜", active: true },
                { v: 100000, e: "🍱" }, { v: 200000, e: "☕" }, { v: 500000, e: "👑" }
            ]
        };

        let currentVal = 50000;

        async function fetchData() {
            try {
                const res = await fetch(`https://my.sepay.vn/api/transactions/list`, {
                    headers: { 'Authorization': `Bearer ${CONFIG.sepay_key}` }
                });
                const data = await res.json();
                
                if (data.status === 200) {
                    // FIX MẠNH: Lấy tất cả giao dịch có chữ QUAN hoặc UNG HO
                    const trans = data.messages.filter(t => {
                        const content = (t.content || "").toUpperCase();
                        return content.includes("QUAN") || content.includes("UNG HO");
                    });

                    const totalSum = trans.reduce((s, t) => s + parseInt(t.amount), 0);
                    
                    // Tính hôm nay chuẩn hơn
                    const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
                    const dailyTrans = trans.filter(t => t.transaction_date.includes(todayStr));
                    const dailySum = dailyTrans.reduce((s, t) => s + parseInt(t.amount), 0);

                    updateUI(dailySum, totalSum, trans.length, trans);
                }
            } catch (e) {
                document.getElementById('donorList').innerHTML = "Lỗi kết nối API";
            }
        }

        function updateUI(dailySum, totalSum, count, list) {
            document.getElementById('dailyTotal').innerText = dailySum.toLocaleString() + "đ";
            document.getElementById('totalReceived').innerText = totalSum.toLocaleString() + "đ";
            document.getElementById('donorCount').innerText = count;

            let pct = Math.min((totalSum / CONFIG.goal) * 100, 100);
            document.getElementById('progressBar').style.width = pct + "%";
            document.getElementById('goalPercent').innerText = Math.round(pct) + "%";

            const container = document.getElementById('donorList');
            if (list.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #4b5563; font-size: 0.7rem;">Chưa có giao dịch nào.</div>';
            } else {
                // Hiện 5 giao dịch mới nhất bất kể ngày nào để check cho dễ
                container.innerHTML = list.slice(0, 5).map(t => `
                    <div class="donor-item">
                        <div class="donor-info"><b>Người bạn tử tế</b><span>${t.transaction_date}</span></div>
                        <div class="donor-amount">+${parseInt(t.amount).toLocaleString()}đ</div>
                    </div>
                `).join('');
            }
        }

        function updateQR() {
            document.getElementById('qrImg').src = `https://qr.sepay.vn/img?acc=${CONFIG.stk}&bank=${CONFIG.bank}&amount=${currentVal}&des=UNG HO QUAN`;
            document.getElementById('amtDisplay').innerText = parseInt(currentVal).toLocaleString() + " VNĐ";
        }

        function renderPrices() {
            document.getElementById('priceGrid').innerHTML = CONFIG.prices.map(p => `
                <div class="price-item ${p.v === currentVal ? 'active' : ''}" onclick="pick(${p.v})">
                    <div style="font-size: 0.9rem;">${p.e}</div>
                    <b style="font-size: 0.8rem;">${p.v/1000}k</b>
                </div>
            `).join('');
        }

        function pick(v) {
            currentVal = v; renderPrices(); updateQR();
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
        }

        function handleCustomInput() {
            const val = document.getElementById('customAmount').value;
            if(val > 0) { currentVal = val; updateQR(); }
        }

        function openMomo() { window.location.href = "https://me.momo.vn/bdquan1852009"; }

        // Chạy ngay
        renderPrices(); updateQR(); fetchData();
        setInterval(fetchData, 10000); // Check liên tục mỗi 10 giây
    </script>
</body>
</html>
