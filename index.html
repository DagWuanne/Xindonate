<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bùi Đăng Quân | Donate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p-color: #6366f1; --s-color: #f43f5e; --t-color: #10b981; --bg: #030712; --card: rgba(17, 24, 39, 0.98); --text: #f9fafb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15), transparent 50%); }
        .container { width: 100%; max-width: 450px; }
        
        .avatar-box { width: 90px; height: 90px; margin: 0 auto 15px; position: relative; padding: 4px; border-radius: 50%; background: linear-gradient(45deg, #ff0000, #48ff00, #002bff, #ff0000); background-size: 400%; animation: moveGradient 5s linear infinite; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg); }

        .panel { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .stat-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; text-align: center; }
        .qr-wrapper { background: #fff; padding: 15px; border-radius: 20px; text-align: center; margin: 15px 0; }
        .qr-wrapper img { width: 100%; max-width: 160px; }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
        .dot.active { background: var(--t-color); box-shadow: 0 0 10px var(--t-color); }
        .dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        .donor-row { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--t-color); animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        button { width:100%; padding:15px; border-radius:15px; border:none; background:#a50064; color:#fff; font-weight:800; cursor:pointer; transition: 0.3s; }
        .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .price-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .price-item.active { background: var(--p-color); border-color: var(--p-color); }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; padding: 20px 0;">
            <div class="avatar-box"><img src="https://i.ibb.co/gZvn2jXg/2c712dc97850837209ce3bc3f67262aa-0.jpg"></div>
            <h1 style="font-size: 1.4rem; font-weight: 800;">Bùi Đăng Quân</h1>
        </header>

        <div class="panel">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; color: var(--p-color)">
                <span>MỤC TIÊU 10 TRIỆU</span><span id="percent">0%</span>
            </div>
            <div style="height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 10px 0; overflow: hidden;">
                <div id="bar" style="height: 100%; background: linear-gradient(90deg, var(--p-color), #a855f7); width: 0%; transition: 2s ease-out;"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <div class="stat-item"><span>Hôm nay</span><br><b id="todayAmt">0đ</b></div>
                <div class="stat-item"><span>Tổng lượt</span><br><b id="donorCount">0</b></div>
            </div>
        </div>

        <div class="panel">
            <div class="price-grid">
                <div class="price-item" onclick="pick(10000)">10k</div>
                <div class="price-item" onclick="pick(20000)">20k</div>
                <div class="price-item active" onclick="pick(50000)">50k</div>
                <div class="price-item" onclick="pick(100000)">100k</div>
                <div class="price-item" onclick="pick(200000)">200k</div>
                <div class="price-item" onclick="pick(500000)">500k</div>
            </div>
            <div class="qr-wrapper">
                <img id="qrImg" src="">
                <div style="margin-top:10px; font-size:0.7rem; color:#000; font-weight:800;">NỘI DUNG: UNG HO QUAN</div>
            </div>
            <button onclick="window.location.href='https://me.momo.vn/bdquan1852009'">DONATE QUA MOMO</button>
        </div>

        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="font-size: 0.9rem;">🏆 BẢNG VÀNG</h3>
                <div style="display: flex; align-items: center; gap: 5px; font-size: 0.6rem; font-weight: 800; color: #94a3b8;">
                    <div id="dot" class="dot"></div> <span id="stt">ĐANG KẾT NỐI</span>
                </div>
            </div>
            <div id="list" style="font-size: 0.8rem; text-align: center; color: #64748b; min-height: 50px;">
                Đang nạp dữ liệu từ Google Script...
            </div>
        </div>
    </div>

    <script>
        // LINK GOOGLE MỚI NHẤT CỦA QUÂN
        const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxxsj80714xxfXcWUSbHoqlRtuT0dCNTdjTgNpTTA2OkctUccmeo56ZoCrxHG9trzXy7w/exec';
        const STK = '18520091234';

        async function loadData() {
            const dot = document.getElementById('dot');
            const stt = document.getElementById('stt');
            dot.className = 'dot loading';
            
            try {
                const res = await fetch(PROXY_URL);
                const data = await res.json();

                if (data && data.messages) {
                    dot.className = 'dot active';
                    stt.innerText = 'ONLINE';
                    
                    const trans = data.messages.filter(t => (t.content || "").toUpperCase().includes("QUAN"));
                    const total = trans.reduce((s, t) => s + parseInt(t.amount), 0);
                    const today = new Date().toLocaleDateString('en-CA');
                    const daily = trans.filter(t => t.transaction_date.includes(today)).reduce((s, t) => s + parseInt(t.amount), 0);

                    document.getElementById('todayAmt').innerText = daily.toLocaleString() + "đ";
                    document.getElementById('donorCount').innerText = trans.length;
                    const p = Math.min((total/10000000)*100, 100);
                    document.getElementById('bar').style.width = p + "%";
                    document.getElementById('percent').innerText = Math.round(p) + "%";

                    if(trans.length > 0) {
                        document.getElementById('list').innerHTML = trans.slice(0, 5).map(t => `
                            <div class="donor-row">
                                <div style="text-align:left">
                                    <b style="color:#fff">${t.account_name ? t.account_name.split(' ').map(n=>n[0]+'***').join(' ') : 'Ẩn danh'}</b><br>
                                    <small style="color:#94a3b8; font-size:0.6rem">${t.transaction_date}</small>
                                </div>
                                <b style="color:var(--t-color)">+${parseInt(t.amount).toLocaleString()}đ</b>
                            </div>
                        `).join('');
                    } else {
                        document.getElementById('list').innerHTML = "Chưa có giao dịch nào.";
                    }
                }
            } catch (e) {
                stt.innerText = 'LỖI KẾT NỐI';
                dot.className = 'dot';
                console.error(e);
            }
        }

        function pick(amt) {
            document.querySelectorAll('.price-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            updateQR(amt);
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
        }

        function updateQR(amt) {
            document.getElementById('qrImg').src = `https://qr.sepay.vn/img?acc=${STK}&bank=MBBank&amount=${amt}&des=UNG HO QUAN`;
        }

        updateQR(50000);
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
